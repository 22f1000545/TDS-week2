name: Daily Update by 22f1000545@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 22 * * *'  # Runs daily at 10 PM UTC (pick any specific time, like this)
  workflow_dispatch:      # Lets you test manually right away

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update timestamp file by 22f1000545@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" > UPDATE_LOG.txt

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "22f1000545@ds.study.iitm.ac.in"
          git add UPDATE_LOG.txt
          git commit -m "Daily automated update [$(date +%Y-%m-%d)]" || echo "No changes"
          git push
